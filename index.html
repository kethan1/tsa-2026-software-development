<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover"
    />
    <title>SenseSync — Sound Awareness for the Deaf & HOH</title>
    <meta
      name="description"
      content="SenseSync classifies environmental sounds and shows their direction on a 360° radar with haptic alerts — a sensory accessibility assistant for Deaf and Hard-of-Hearing users."
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=JetBrains+Mono:wght@400..700&display=swap"
      rel="stylesheet"
    />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0d0d0d" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- iOS standalone / home-screen install -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SenseSync" />

    <style>
      html { background-color: #0d0d0d; }
      html[data-theme="light"] { background-color: #f4f4f5; }
    </style>

    <!-- Apply the saved theme before first paint so light-mode users don't see a
         dark flash on reload. Kept in sync at runtime by src/theme.ts. -->
    <script>
      (function () {
        try {
          if (localStorage.getItem('sensesync-theme') === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
            var meta = document.querySelector('meta[name="theme-color"]');
            if (meta) meta.setAttribute('content', '#f4f4f5');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
